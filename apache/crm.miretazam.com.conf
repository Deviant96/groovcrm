# Host Apache vhost for crm.miretazam.com
#
# Install on your VPS (not inside Docker):
#   sudo cp apache/crm.miretazam.com.conf /etc/apache2/sites-available/
#   sudo a2enmod proxy proxy_http headers
#   sudo a2ensite crm.miretazam.com
#   sudo systemctl reload apache2
#
# Requires docker compose services bound to localhost (see docker-compose.yml):
#   backend  → 127.0.0.1:3000
#   frontend → 127.0.0.1:8081

<VirtualHost *:80>
  ServerName crm.miretazam.com

  ProxyPreserveHost On
  RequestHeader set X-Forwarded-Proto "https" env=HTTPS

  # API
  ProxyPass /api http://127.0.0.1:3000/api
  ProxyPassReverse /api http://127.0.0.1:3000/api

  # Frontend SPA
  ProxyPass / http://127.0.0.1:8081/
  ProxyPassReverse / http://127.0.0.1:8081/

  ErrorLog ${APACHE_LOG_DIR}/crm.miretazam.com-error.log
  CustomLog ${APACHE_LOG_DIR}/crm.miretazam.com-access.log combined
</VirtualHost>
