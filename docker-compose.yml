services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-groovcrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-groovcrm}
      POSTGRES_DB: ${POSTGRES_DB:-groovcrm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-groovcrm} -d ${POSTGRES_DB:-groovcrm}']
      interval: 5s
      timeout: 5s
      retries: 10
    # Bind Postgres to localhost only (optional host access for backups/migrations).
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-groovcrm}:${POSTGRES_PASSWORD:-groovcrm}@db:5432/${POSTGRES_DB:-groovcrm}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      JWT_REFRESH_REMEMBER_EXPIRES_IN: ${JWT_REFRESH_REMEMBER_EXPIRES_IN:-30d}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-https://crm.miretazam.com}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    # Exposed on localhost for the VPS host Apache reverse proxy.
    ports:
      - '127.0.0.1:${BACKEND_HOST_PORT:-3000}:3000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    # Exposed on localhost for the VPS host Apache reverse proxy.
    ports:
      - '127.0.0.1:${FRONTEND_HOST_PORT:-8081}:80'

volumes:
  pgdata:
